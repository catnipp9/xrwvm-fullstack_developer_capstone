<html>
<head>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <title>Contact Us | Best Cars Dealership</title>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light" style="background-color:darkturquoise; height: 1in;">
    <div class="container-fluid">
      <h2 style="padding-right: 5%;">Dealerships</h2>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarText">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" style="font-size: larger;" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" style="font-size: larger;" href="/about">About Us</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" style="font-size: larger;" href="/contact">Contact Us</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card shadow">
      <div class="card-body">
        <h1 class="text-center mb-4">Get In Touch</h1>
        <div class="row">
          <div class="col-md-6">
            <h3>Our Office</h3>
            <p><strong>Address:</strong> 123 Car Avenue, Detroit, MI 48201</p>
            <p><strong>Phone:</strong> +1 (555) 012-3456</p>
            <p><strong>Email:</strong> support@bestcars.com</p>
            <p><strong>Hours:</strong> Mon-Sat: 9:00 AM - 7:00 PM</p>
          </div>
          <div class="col-md-6">
            <form>
              <div class="mb-3">
                <input type="text" class="form-control" placeholder="Your Name">
              </div>
              <div class="mb-3">
                <input type="email" class="form-control" placeholder="Your Email">
              </div>
              <div class="mb-3">
                <textarea class="form-control" rows="3" placeholder="How can we help?"></textarea>
              </div>
              <button type="submit" class="btn btn-info w-100" style="background-color: darkturquoise;">Send Message</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
